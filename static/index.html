<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dataset Processor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f3f4f6;
      color: #111827;
      padding: 2rem;
    }

    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #374151; }

    .upload-box {
      background: #fff;
      border: 2px dashed #d1d5db;
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      max-width: 480px;
    }

    .upload-box input[type="file"] { display: block; margin-bottom: 0.75rem; }

    button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    button.delete-btn {
      background: none;
      color: #9ca3af;
      padding: 0.2rem 0.4rem;
      font-size: 1rem;
      line-height: 1;
      border-radius: 0.4rem;
    }
    button.delete-btn:hover { background: #fee2e2; color: #dc2626; }
    button.retry-btn {
      background: none;
      color: #2563eb;
      border: 1px solid #2563eb;
      padding: 0.2rem 0.6rem;
      font-size: 0.78rem;
      border-radius: 0.4rem;
    }
    button.retry-btn:hover { background: #eff6ff; }
    button.retry-btn:disabled { border-color: #93c5fd; color: #93c5fd; background: none; cursor: not-allowed; }

    #upload-msg { margin-top: 0.6rem; font-size: 0.85rem; color: #6b7280; }
    #upload-msg.error { color: #dc2626; }

    .task-list { display: flex; flex-direction: column; gap: 1rem; max-width: 700px; }

    .card {
      background: #fff;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.4rem;
    }

    .card-header .filename { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-header .dataset-id { font-size: 0.8rem; color: #6b7280; }
    .card-footer { font-size: 0.75rem; color: #9ca3af; margin-top: 0.4rem; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .badge-pending    { background: #e5e7eb; color: #6b7280; }
    .badge-processing { background: #fef3c7; color: #92400e; }
    .badge-completed  { background: #d1fae5; color: #065f46; }
    .badge-failed     { background: #fee2e2; color: #991b1b; }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #fbbf24;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }

    .error-msg { color: #dc2626; font-size: 0.85rem; margin-top: 0.5rem; }

    details { margin-top: 0.6rem; }
    summary { cursor: pointer; font-size: 0.85rem; color: #2563eb; user-select: none; }

    table { border-collapse: collapse; margin-top: 0.5rem; font-size: 0.82rem; width: 100%; }
    th, td { text-align: left; padding: 0.3rem 0.6rem; border-bottom: 1px solid #e5e7eb; }
    th { background: #f9fafb; font-weight: 600; }
  </style>
</head>
<body>

<h1>Dataset Processing Web System</h1>

<div class="upload-box">
  <h2>Upload Dataset</h2>
  <input type="file" id="file-input" accept=".json,application/json" />
  <button id="upload-btn">Upload</button>
  <div id="upload-msg"></div>
</div>

<h2>Tasks</h2>
<div id="task-list" class="task-list"></div>

<script>
  const uploadBtn = document.getElementById('upload-btn');
  const fileInput = document.getElementById('file-input');
  const uploadMsg = document.getElementById('upload-msg');
  const taskListEl = document.getElementById('task-list');

  uploadBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file) { showMsg('Please select a file first.', true); return; }

    uploadBtn.disabled = true;
    showMsg('Uploading…');

    const form = new FormData();
    form.append('file', file);

    try {
      const res = await fetch('/datasets', { method: 'POST', body: form });
      const body = await res.json();
      if (!res.ok) {
        showMsg(body.detail || 'Upload failed.', true);
      } else {
        showMsg(`Queued as task ${body.task_id}`);
        fileInput.value = '';
        fetchTasks();
      }
    } catch (e) {
      showMsg('Network error.', true);
    } finally {
      uploadBtn.disabled = false;
    }
  });

  function showMsg(text, isError = false) {
    uploadMsg.textContent = text;
    uploadMsg.className = isError ? 'error' : '';
  }

  async function fetchTasks() {
    try {
      const res = await fetch('/tasks');
      if (!res.ok) return;
      const tasks = await res.json();
      renderTasks(tasks);
    } catch (_) {}
  }

  function renderTasks(tasks) {
    const openIds = new Set(
      [...taskListEl.querySelectorAll('details[data-task-id][open]')]
        .map(el => el.dataset.taskId)
    );

    if (tasks.length === 0) {
      taskListEl.innerHTML = '<p style="color:#9ca3af;font-size:.85rem">No tasks yet.</p>';
      return;
    }
    taskListEl.innerHTML = tasks.map(renderCard).join('');

    taskListEl.querySelectorAll('details[data-task-id]').forEach(el => {
      if (openIds.has(el.dataset.taskId)) el.open = true;
    });
  }

  function renderCard(task) {
    const badgeClass = `badge badge-${task.status}`;
    const statusLabel = task.status === 'processing'
      ? `<span class="spinner"></span>${task.status}`
      : task.status;

    let extra = '';
    if (task.status === 'failed') {
      extra = `
        <div class="error-msg" style="display:flex;align-items:center;gap:.6rem">
          ${task.error ? `<span>Error: ${esc(task.error)}</span>` : ''}
          <button class="retry-btn" onclick="retryTask('${esc(task.id)}', this)">Retry</button>
        </div>`;
    }
    if (task.status === 'completed' && task.result) {
      extra = renderResult(task);
    }

    return `
      <div class="card">
        <div class="card-header">
          <span class="filename" title="${esc(task.filename)}">${esc(task.filename)}</span>
          <span class="dataset-id">${esc(task.dataset_id)}</span>
          <span class="${badgeClass}">${statusLabel}</span>
          <button class="delete-btn" title="Remove task" onclick="deleteTask('${esc(task.id)}', this)">✕</button>
        </div>
        ${extra}
        <div class="card-footer">Created: ${fmtDate(task.created_at)}</div>
      </div>`;
  }

  function renderResult(task) {
    const r = task.result;
    const catRows = Object.entries(r.category_summary || {})
      .map(([cat, cnt]) => `<tr><td>${esc(cat)}</td><td>${cnt}</td></tr>`)
      .join('');

    return `
      <details data-task-id="${esc(task.id)}">
        <summary>View results</summary>
        <table>
          <tr><th>Metric</th><th>Value</th></tr>
          <tr><td>Record count</td><td>${r.record_count}</td></tr>
          <tr><td>Invalid records</td><td>${r.invalid_records}</td></tr>
          <tr><td>Average value</td><td>${r.average_value !== null ? r.average_value.toFixed(2) : '—'}</td></tr>
        </table>
        ${catRows ? `
        <table style="margin-top:.5rem">
          <tr><th>Category</th><th>Count</th></tr>
          ${catRows}
        </table>` : ''}
      </details>`;
  }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function fmtDate(iso) {
    try { return new Date(iso).toLocaleString(); } catch (_) { return iso; }
  }

  // Full task detail needed for result — fetch individual tasks when completed
  async function fetchTasksWithResults() {
    try {
      const res = await fetch('/tasks');
      if (!res.ok) return;
      const tasks = await res.json();

      const enriched = await Promise.all(tasks.map(async (t) => {
        if (t.status === 'completed') {
          const r = await fetch(`/tasks/${t.id}`);
          if (r.ok) return await r.json();
        }
        return t;
      }));

      renderTasks(enriched);
    } catch (_) {}
  }

  async function retryTask(taskId, btn) {
    btn.disabled = true;
    try {
      const res = await fetch(`/tasks/${taskId}/retry`, { method: 'POST' });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        alert('Could not retry task: ' + (body.detail || res.status));
        btn.disabled = false;
        return;
      }
    } catch (e) {
      alert('Network error while retrying task.');
      btn.disabled = false;
      return;
    }
    fetchTasksWithResults();
  }

  async function deleteTask(taskId, btn) {
    btn.disabled = true;
    try {
      const res = await fetch(`/tasks/${taskId}`, { method: 'DELETE' });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        alert('Could not delete task: ' + (body.detail || res.status));
        btn.disabled = false;
        return;
      }
    } catch (e) {
      alert('Network error while deleting task.');
      btn.disabled = false;
      return;
    }
    fetchTasksWithResults();
  }

  fetchTasksWithResults();
  setInterval(fetchTasksWithResults, 2000);
</script>
</body>
</html>
